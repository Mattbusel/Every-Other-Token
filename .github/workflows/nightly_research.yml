name: Nightly Research CI

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Run research (skip if no API key)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cargo run --release -- "What is the meaning of life?" --research --runs 3 --output nightly_results.json

      - name: Upload research results
        if: env.OPENAI_API_KEY != ''
        uses: actions/upload-artifact@v4
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          name: nightly-research-results
          path: nightly_results.json
