# cargo-deny configuration
# Run: cargo deny check

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "none"
yanked = "none"
notice = "none"

[licenses]
# Allow permissive and common open-source licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]
copyleft = "warn"
allow-osi-fsf-free = "none"
default = "deny"
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
